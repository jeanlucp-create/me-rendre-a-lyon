<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobilité Lyon</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family:Arial; margin:0; }

#map { height:50vh; }

.item {
  padding:10px;
  border-bottom:1px solid #ddd;
  cursor:pointer;
}

.item:hover {
  background:#f5f5f5;
}

.borne {
  background:#eee;
  margin:4px 0;
  padding:6px;
  cursor:pointer;
}
</style>

</head>

<body>

<h2 style="padding:10px">🚗 Parkings + ⚡ Bornes</h2>

<div id="list"></div>
<div id="detail"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API = "https://me-rendre-a-lyon.jean-luc-perrotto.workers.dev";

let data = {};
let selected = null;
let map;

// ✅ SAFE
function safe(v){ return v ?? '—'; }

// ── LOAD ──
async function load(){
  try{
    const r = await fetch(API);
    data = await r.json();

    initMap();
    render();

  }catch(e){
    document.getElementById("list").innerHTML="Erreur API";
    console.error(e);
  }
}

// ── MAP INIT ──
function initMap(){
  map = L.map('map').setView([45.75,4.85],12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// ── LIST ──
function render(){

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.parkings.tcl.forEach(p=>{

    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      🚇 ${p.nom}
      <br>
      ${safe(p.places_disponibles)} / ${safe(p.nb_places)}
    `;

    el.onclick = ()=>showDetail(p);

    list.appendChild(el);
  });

  renderMap();
}

// ── DETAIL ──
function showDetail(p){

  selected = p;

  let html = `<h3>${p.nom}</h3>`;
  html += `<p>${safe(p.places_disponibles)} / ${safe(p.nb_places)} places</p>`;

  if(p.bornes?.length){

    html += "<h4>⚡ Bornes</h4>";

    p.bornes.forEach((b,i)=>{
      html += `
        <div class="borne" onclick="showBorne(${i})">
          ${safe(b.operateur)} - ${safe(b.puissance_max_kw)} kW
        </div>
      `;
    });

  } else {
    html += "<p>Aucune borne</p>";
  }

  document.getElementById("detail").innerHTML = html;

  if(p.lat && p.lng){
    map.setView([p.lat,p.lng],14);
  }
}

// ── BORNE ──
function showBorne(i){

  if(!selected?.bornes || !selected.bornes[i]){
    console.warn("Borne introuvable");
    return;
  }

  const b = selected.bornes[i];

  let prises = [];
  if(b.types_prise){
    prises = b.types_prise.split(/[,;]+/)
      .map(t=>t.trim())
      .filter(Boolean);
  }

  const ptxt = prises.length ? prises.join(", ") : "Non renseigné";

  document.getElementById("detail").innerHTML = `
    <h3>${safe(b.nom)}</h3>
    <p>${safe(b.operateur)}</p>
    <p>${safe(b.puissance_max_kw)} kW</p>
    <p>${safe(b.nb_points)} points</p>
    <p>${ptxt}</p>

    <button onclick="navigate(${b.lat}, ${b.lng})">🧭 S'y rendre</button>
    <br>
    <button onclick="showDetail(selected)">← retour</button>
  `;
}

// ── NAVIGATION ──
function navigate(lat,lng){
  if(lat && lng){
    window.open(`https://www.google.com/maps?q=${lat},${lng}`);
  }
}

// ── MAP ──
function renderMap(){

  map.eachLayer(layer=>{
    if(layer instanceof L.Marker || layer instanceof L.CircleMarker){
      map.removeLayer(layer);
    }
  });

  data.parkings.tcl.forEach(p=>{
    if(!p.lat || !p.lng) return;

    L.marker([p.lat,p.lng])
      .addTo(map)
      .bindPopup(p.nom);
  });

  (data.bornes || []).forEach(b=>{
    if(!b.lat || !b.lng) return;

    L.circleMarker([b.lat,b.lng],{
      color:"green"
    }).addTo(map);
  });
}

load();

</script>

</body>
</html>
``
